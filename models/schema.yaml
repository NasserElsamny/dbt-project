version: 2

models:
  - name: customers_stg
    description:
    columns:
      - name: Email
        description:
        tests:
          - string_not_empty

  - name: orders_stg
    description:
    columns:
      - name: OrderID
        description:
        tests:
          - unique
          - not_null

      - name: StatusCD
        description:
        tests:
          - accepted_values:
              arguments:              
                values: ["01", "02", "03"]
